apiVersion: v1
kind: Service
metadata:
  name: royaltracker-bot
  labels: {{- include "royaltracker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "royaltracker.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bot
  ports:
    - name: http
      port: 80
      targetPort: http
