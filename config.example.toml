# Copy to config.toml or set ROYALTRACKER_* env vars.
# Env vars override file values; nested keys use double-underscore: ROYALTRACKER_TELEGRAM__BOT_TOKEN.
#
# RCG user credentials are NOT stored here anymore — each user registers via the
# Telegram bot's /register flow and their (encrypted) credentials are persisted in
# the users table. This config holds only shared/admin settings.

database_url       = "sqlite:dev.db?mode=rwc"
jitter_minutes     = 10

# Shared OAuth basic-auth from the RCG JS bundle (public client_id:secret).
# Phase-0 value — re-pull from jdeath/CheckRoyalCaribbeanPrice if it rotates.
rcg_basic_auth_b64 = "ZzlTMDIzdDc0NDczWlVrOTA5Rk42OEYwYjRONjdQU09oOTJvMDR2TDBCUjY1MzdwSTJ5Mmg5NE02QmJVN0Q2SjpXNjY4NDZrUFF2MTc1MDk3NW9vZEg1TTh6QzZUYTdtMzBrSDJRNzhsMldtVTUwRkNncXBQMTN3NzczNzdrN0lC"

# Generate ONCE with:  cargo run -q --example gen-key  (or in a one-off:
#   nix develop -c cargo run -q -p royaltracker-crypto --example gen-key)
# Anyone with this key can decrypt every stored password — back it up out of band.
encryption_key_b64 = "REPLACE_ME_32_BYTES_BASE64"

[telegram]
bot_token      = "REPLACE_ME"
admin_chat_id  = 0    # optional; system messages go here. Omit / 0 to disable.
